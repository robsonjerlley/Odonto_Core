spring.application.name=odontocore.crm
spring.config.import=optional:application-local.properties

# Perfil ativo (Railway: definir SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Porta HTTP (Railway injeta PORT em runtime)
server.port=${PORT:8080}
server.shutdown=graceful

# Banco de Dados (PostgreSQL)
# Em produção, sobrescrever via env: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/odontocoredb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true

# Log de transações (dev)
logging.level.org.springframework.transaction=DEBUG

# Fuso horário — Jackson serializa tipos com zona (Instant/Date/ZonedDateTime)
# em Brasília. LocalDateTime não sofre conversão; o fuso da JVM é fixado em
# Application.main (APP_TIMEZONE, default America/Sao_Paulo).
spring.jackson.time-zone=America/Sao_Paulo

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Admin padrão — criado apenas no primeiro boot se não houver usuários
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD}
app.admin.name=${ADMIN_NAME:Administrador}
# Clínica do admin padrão (clínica única atual — ADR-022/024)
app.admin.clinicId=${ADMIN_CLINIC_ID:00000000-0000-0000-0000-000000000001}

# Virtual Threads
spring.threads.virtual.enabled=true
