# ============================================
# Perfil de produção (ativar com SPRING_PROFILES_ACTIVE=prod)
# ============================================

# JPA / Hibernate — sem ruído SQL em produção
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Pool de conexões (HikariCP) — dimensionado para plano free/hobby do Railway
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging — INFO no app, WARN em libs barulhentas
logging.level.root=INFO
logging.level.io.sertaoBit.odontocore=INFO
logging.level.org.springframework.transaction=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Compressão de respostas HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Erros — não expor stacktrace
server.error.include-stacktrace=never
server.error.include-message=never
