spring.application.name=odontocore.crm

# Testcontainers com PostgreSQL (configurado via AbstractTestcontainerTest)
# Propriedades abaixo são sobrescritas dinamicamente

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=test-secret-key-for-testing-purposes-only
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173

# Admin padrão
app.admin.username=testadmin
app.admin.password=testpass
app.admin.name=Test Admin
